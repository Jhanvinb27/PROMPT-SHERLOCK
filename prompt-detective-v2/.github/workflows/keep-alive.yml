name: Keep Backend Alive

on:
  schedule:
    # Run every 14 minutes to prevent Render free tier from sleeping
    - cron: '*/14 * * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Backend Health Endpoint
        run: |
          echo "Pinging backend at $(date)"
          
          # Try to ping the health endpoint
          response=$(curl -s -o /dev/null -w "%{http_code}" https://prompt-detective-backend.onrender.com/health || echo "000")
          
          if [ "$response" = "200" ]; then
            echo "✅ Backend is healthy (HTTP $response)"
          elif [ "$response" = "000" ]; then
            echo "⚠️  Backend is warming up (connection timeout/error)"
            echo "Waiting 30 seconds and retrying..."
            sleep 30
            response=$(curl -s -o /dev/null -w "%{http_code}" https://prompt-detective-backend.onrender.com/health || echo "000")
            echo "Retry response: HTTP $response"
          else
            echo "⚠️  Unexpected response: HTTP $response"
          fi
          
      - name: Send Notification on Failure
        if: failure()
        run: |
          echo "❌ Failed to ping backend. Please check Render dashboard."
