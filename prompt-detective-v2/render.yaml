databases:
  - name: prompt-detective-db
    databaseName: prompt_detective
    user: prompt_detective_user
    plan: free

services:
  - type: web
    name: prompt-detective-backend
    runtime: python3
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prompt-detective-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_HOURS
        value: "24"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      - key: RATE_LIMIT_PER_MINUTE
        value: "30"
      - key: GROQ_API_KEY
        value: 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
      - key: GROQ_MODEL
        value: meta-llama/llama-4-maverick-17b-128e-instruct